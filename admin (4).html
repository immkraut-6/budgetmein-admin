<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BudgetMein Admin</title>
<meta name="theme-color" content="#FF4500"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="BudgetMein Admin"/>
<link rel="icon" type="image/png" href="https://res.cloudinary.com/dklefbj2a/image/upload/w_192,h_192,c_fill,f_png/v1774136201/BudgetMein_icon_ryjjlh.jpg"/>
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dklefbj2a/image/upload/w_192,h_192,c_fill,f_png/v1774136201/BudgetMein_icon_ryjjlh.jpg"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  BudgetMein Admin Panel — STANDALONE FILE
  ✅ Works from ANY domain / repo / URL
  ✅ No other files needed
  ✅ Firebase connected directly
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import{getFirestore,collection,getDocs,doc,updateDoc,deleteDoc}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
import{getAuth,signInAnonymously}from"https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
const FB={apiKey:"AIzaSyCVPIRPTwByKE431I5QwcPEmTH9qgcitj8",authDomain:"budgetmein-62bc0.firebaseapp.com",projectId:"budgetmein-62bc0",storageBucket:"budgetmein-62bc0.firebasestorage.app",messagingSenderId:"1097719035074",appId:"1:1097719035074:web:1570114f2b10d6fbe8775b"};
const fbApp=initializeApp(FB);
const db=getFirestore(fbApp);
const auth=getAuth(fbApp);
// Sign in anonymously so Firestore rules (request.auth != null) pass
signInAnonymously(auth).catch(function(e){console.warn('[Admin] Auth err:',e.message);});
const TG="8601047628:AAFJ0GppVLF8Fdz-cAlY7C3qAZFZVGGJeHw";
const TG_ORD="-5158992691";
async function tgMsg(text){
  try{await fetch("https://api.telegram.org/bot"+TG+"/sendMessage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:TG_ORD,parse_mode:"HTML",text:text})});}catch(e){}
}
window._allOrders=[];
window.loadOrders=async function(){
  document.getElementById('loading').style.display='block';
  document.getElementById('ordersDiv').innerHTML='';
  try{
    var orders=[];
    var snap=await getDocs(collection(db,"orders"));
    snap.forEach(function(d){orders.push({_docId:d.id,...d.data()});});
    orders.sort(function(a,b){
      var at=a.startTime||0,bt=b.startTime||0;
      if(typeof at==='object'&&at&&at.seconds)at=at.seconds*1000;
      if(typeof bt==='object'&&bt&&bt.seconds)bt=bt.seconds*1000;
      return bt-at;
    });
    window._allOrders=orders;
    renderOrders(orders);
  }catch(e){
    document.getElementById('ordersDiv').innerHTML='<div class="errmsg">⚠️ '+e.message+'<br/><br/><button class="rbtn" onclick="loadOrders()">Try Again</button></div>';
  }
  document.getElementById('loading').style.display='none';
};
function renderOrders(orders){
  var div=document.getElementById('ordersDiv');
  var active=orders.filter(function(o){return o.status!=='Delivered';}).length;
  var done=orders.filter(function(o){return o.status==='Delivered';}).length;
  var revenue=orders.reduce(function(s,o){return s+(Number(o.total)||0);},0);
  document.getElementById('stats').innerHTML=
    '<div class="stat"><span class="snum">'+orders.length+'</span><span class="slbl">Total</span></div>'+
    '<div class="stat act"><span class="snum">'+active+'</span><span class="slbl">Active 🔄</span></div>'+
    '<div class="stat dn"><span class="snum">'+done+'</span><span class="slbl">Done ✅</span></div>'+
    '<div class="stat rv"><span class="snum">₹'+revenue+'</span><span class="slbl">Revenue 💰</span></div>';
  if(!orders.length){
    div.innerHTML='<div class="empty">No orders yet 🍔<br/>Orders appear here when customers place them.</div>';
    return;
  }
  div.innerHTML=orders.map(function(o){
    var st=o.startTime||0;
    if(typeof st==='object'&&st&&st.seconds)st=st.seconds*1000;
    var elapsed=st?((Date.now()-st)/60000):0;
    var isDone=o.status==='Delivered';
    var phase='📋 Order Received';
    if(isDone)phase='✅ Delivered';
    else if(elapsed>=18)phase='🛵 Out for Delivery';
    else if(elapsed>=4)phase='🔄 Being Prepared';
    var items=(o.itemsFull&&o.itemsFull.length)
      ?o.itemsFull.map(function(i){return'• '+(i.e||'🍽️')+' '+i.n+(i.meta?' ('+i.meta+')':'')+' ×'+i.qty+'   ₹'+(i.p*i.qty);}).join('\n')
      :(o.items||'—');
    var cleanPhone=(o.phone||'').replace(/\D/g,'');
    if(cleanPhone.length===10) cleanPhone='91'+cleanPhone;
    // Mask phone for delivery boy — show only for call/WA buttons, not as text
    var maskedPhone=o.phone?o.phone.slice(0,-4).replace(/\d/g,'*')+o.phone.slice(-4):'N/A';
    return'<div class="ocard '+(isDone?'done':'actv')+'" id="oc-'+o._docId+'">'
      +'<div class="ohead">'
        +'<span class="oid">#'+(o.id||'?')+'</span>'
        +'<span class="ophase '+(isDone?'phdone':'phact')+'">'+phase+'</span>'
        +'<span class="odt">'+(o.date||'')+(o.time?' · '+o.time:'')+'</span>'
      +'</div>'
      +'<div class="ocust">'
        +'<b>👤 '+(o.name||'Guest')+'</b>'
        +'<span>📱 '+maskedPhone+' <small style="color:#555;font-size:.65rem">(hidden for privacy)</small></span>'
        +'<span>📍 '+(o.address||'N/A')+'</span>'
      +'</div>'
      +(o.specialNote?'<div style="background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:8px 10px;font-size:.74rem;color:#FFD700;margin-bottom:9px">📝 <b>Customer Note:</b> '+o.specialNote+'</div>':'')
      // ── DELIVERY BOY INFO ──
      +(o.assignedTo
        ?'<div style="background:rgba(40,167,69,.08);border:1.5px solid rgba(40,167,69,.3);border-radius:10px;padding:10px 12px;margin-bottom:9px;font-size:.76rem;line-height:1.9">'
          +'<div style="font-weight:800;color:#28A745;margin-bottom:4px">🛵 Delivery Boy Assigned</div>'
          +'<div style="color:#ccc">👤 <b style="color:#fff">'+(o.assignedName||'Unknown')+'</b></div>'
          +'<div style="color:#ccc">📱 <b style="color:#fff">'+(o.assignedPhone||'—')+'</b></div>'
          +(o.acceptedAt?'<div style="color:#aaa">⏰ Accepted: <b style="color:#FFD700">'+new Date(o.acceptedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+'</b></div>':'')
          +(o.deliveredAt?'<div style="color:#aaa">✅ Delivered: <b style="color:#28A745">'+new Date(o.deliveredAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+'</b></div>':'')
          +(o.deliveryTimeMin?'<div style="color:#aaa">⚡ Time Taken: <b style="color:#FF8C00">'+o.deliveryTimeMin+' minutes</b></div>':'')
        +'</div>'
        :'<div style="background:rgba(255,69,0,.06);border:1px dashed rgba(255,69,0,.2);border-radius:10px;padding:8px 12px;margin-bottom:9px;font-size:.74rem;color:#FF4500">⏳ Waiting for delivery boy to accept...</div>'
      )
      +'<pre class="oitems">'+items+'</pre>'
      +'<div class="obill">'
        +'<span>Subtotal: ₹'+(o.subtotal||o.total||0)+'</span>'
        +'<span>Delivery: '+(o.delivery===0?'FREE 🎉':'₹'+(o.delivery||20))+'</span>'
        +'<b class="otot">TOTAL: ₹'+o.total+'</b>'
        +'<span>💵 Cash on Delivery</span>'
      +'</div>'
      +'<div class="oacts">'
        +(!isDone
          ?'<button class="btndeliver" onclick="markDone(\''+o._docId+'\',\''+o.id+'\',this)">📦 Mark as Delivered</button>'
          :'<span class="donebadge">✅ Delivered</span>')
        +(cleanPhone?'<a class="btnwa" href="https://wa.me/'+cleanPhone+'?text=Hi+'+encodeURIComponent(o.name||'Customer')+',+your+order+%23'+(o.id||'')+'+" target="_blank">💬</a>':'')
        +(cleanPhone?'<a class="btnwa" href="tel:+'+cleanPhone+'" style="font-size:.75rem">📞</a>':'')
        +'<button class="btndel" onclick="delOrder(\''+o._docId+'\',\''+o.id+'\')">🗑️</button>'
      +'</div>'
    +'</div>';
  }).join('');
}
window.markDone=async function(docId,orderId,btn){
  if(!confirm('Mark #'+orderId+' as DELIVERED?'))return;
  if(btn){btn.textContent='Updating...';btn.disabled=true;}
  try{
    await updateDoc(doc(db,'orders',docId),{status:'Delivered'});
    var o=window._allOrders.find(function(x){return x._docId===docId;})||{};
    await tgMsg('✅ <b>ORDER DELIVERED!</b>\n──────────────\n🆔 #'+orderId+'\n👤 '+(o.name||'Guest')+'\n📱 '+(o.phone||'N/A')+'\n📍 '+(o.address||'N/A')+'\n💰 ₹'+(o.total||0)+'\n⏰ '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}));
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);if(btn){btn.textContent='📦 Mark as Delivered';btn.disabled=false;}}
};
window.delOrder=async function(docId,orderId){
  if(!confirm('Permanently delete order #'+orderId+'?\nThis cannot be undone!'))return;
  try{
    await deleteDoc(doc(db,'orders',docId));
    window._allOrders=window._allOrders.filter(function(o){return o._docId!==docId;});
    var card=document.getElementById('oc-'+docId);
    if(card){card.style.opacity='0';card.style.transform='scale(.95)';setTimeout(function(){card.remove();},300);}
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);}
};
window.clearDone=async function(){
  var done=window._allOrders.filter(function(o){return o.status==='Delivered';});
  if(!done.length){alert('No delivered orders to clear!');return;}
  if(!confirm('Delete '+done.length+' delivered orders permanently?'))return;
  try{
    await Promise.all(done.map(function(o){return deleteDoc(doc(db,'orders',o._docId));}));
    alert('✅ Cleared '+done.length+' orders!');
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);}
};
window.clearAll=async function(){
  if(!window._allOrders.length){alert('No orders to delete!');return;}
  if(!confirm('⚠️ Delete ALL '+window._allOrders.length+' orders permanently?'))return;
  if(!confirm('Last chance! This CANNOT be undone!'))return;
  try{
    await Promise.all(window._allOrders.map(function(o){return deleteDoc(doc(db,'orders',o._docId));}));
    alert('✅ All orders deleted!');
    window.loadOrders();
  }catch(e){alert('Error: '+e.message);}
};
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0D0D1A;color:#fff;min-height:100vh}
#loginWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0D0D1A;z-index:999;padding:16px}
.lbox{background:#1A1A2E;border-radius:24px;padding:36px 28px;width:100%;max-width:320px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.lbox h2{font-size:1.6rem;color:#FF4500;margin-bottom:4px}
.lbox p{font-size:.8rem;color:#777;margin-bottom:22px}
.pins{display:flex;gap:10px;justify-content:center;margin-bottom:14px}
.pins input{width:52px;height:60px;border-radius:14px;border:2px solid #2A2A3E;background:#0D0D1A;color:#fff;font-size:1.6rem;text-align:center;font-family:'Poppins',sans-serif;outline:none;transition:border .2s}
.pins input:focus{border-color:#FF4500}
#pinErr{font-size:.76rem;color:#FF4500;min-height:16px;margin-bottom:8px}
.lbtn{width:100%;padding:12px;border:none;border-radius:50px;background:linear-gradient(135deg,#FF4500,#CC3700);color:#fff;font-family:'Poppins',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer}
.lbtn:hover{opacity:.9}
.cpbtn{margin-top:10px;width:100%;background:none;border:1px solid #2A2A3E;color:#555;padding:8px;border-radius:50px;font-family:'Poppins',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s}
.cpbtn:hover{border-color:#FF4500;color:#FF4500}
#cpbox{display:none;margin-top:14px;text-align:left}
#cpbox label{font-size:.74rem;color:#777;display:block;margin-bottom:3px}
#cpbox input{width:100%;padding:9px 12px;border:1.5px solid #2A2A3E;border-radius:10px;background:#0D0D1A;color:#fff;font-family:'Poppins',sans-serif;margin-bottom:8px;font-size:.85rem;outline:none}
#cpbox input:focus{border-color:#FF4500}
.spbtn{width:100%;padding:10px;border:none;border-radius:50px;background:#28A745;color:#fff;font-family:'Poppins',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer}
#panel{display:none;max-width:720px;margin:0 auto;padding:16px}
.topbar{background:#1A1A2E;border-radius:16px;padding:13px 18px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:14px}
.topbar h1{font-size:1.05rem;font-weight:800;color:#FF4500;flex:1}
.rbtn{background:rgba(255,69,0,.1);border:1px solid rgba(255,69,0,.3);color:#FF4500;padding:6px 13px;border-radius:50px;font-family:'Poppins',sans-serif;font-size:.74rem;font-weight:600;cursor:pointer}
.rbtn:hover{background:rgba(255,69,0,.2)}
.rbtn.red{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.3);color:#C0392B}
.rbtn.red:hover{background:rgba(192,57,43,.2)}
.rbtn.grey{background:none;border-color:#333;color:#555}
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:#1A1A2E;border-radius:12px;padding:14px;text-align:center;border:1px solid #1E1E30}
.stat.act{border-color:rgba(255,69,0,.3)}
.stat.dn{border-color:rgba(40,167,69,.25)}
.stat.rv{border-color:rgba(255,215,0,.2)}
.snum{display:block;font-size:1.35rem;font-weight:800;color:#FF4500}
.stat.dn .snum{color:#28A745}
.stat.rv .snum{color:#FFD700;font-size:1rem}
.slbl{font-size:.66rem;color:#555}
#loading{text-align:center;padding:20px;color:#555;display:none}
.errmsg,.empty{text-align:center;padding:40px;color:#666;line-height:2}
.errmsg{color:#FF4500}
.ocard{background:#1A1A2E;border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid #1E1E30;transition:all .3s}
.ocard.actv{border-color:rgba(255,69,0,.3)}
.ocard.done{opacity:.6}
.ohead{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:10px}
.oid{font-size:.92rem;font-weight:800;color:#FF4500}
.ophase{font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:20px}
.phact{background:rgba(255,69,0,.15);color:#FF4500}
.phdone{background:rgba(40,167,69,.15);color:#28A745}
.odt{font-size:.68rem;color:#444;margin-left:auto}
.ocust{font-size:.78rem;color:#aaa;padding:9px;background:rgba(255,255,255,.03);border-radius:9px;margin-bottom:9px;display:flex;flex-direction:column;gap:3px}
.ocust b{color:#fff;font-size:.82rem}
pre.oitems{font-family:'Poppins',sans-serif;font-size:.74rem;color:#777;padding:9px;background:rgba(255,255,255,.02);border-radius:9px;margin-bottom:9px;white-space:pre-wrap;line-height:1.9}
.obill{display:flex;flex-wrap:wrap;gap:8px;font-size:.74rem;color:#555;margin-bottom:12px}
.otot{color:#FFD700!important;font-size:.82rem}
.oacts{display:flex;gap:8px}
.btndeliver{flex:1;padding:10px;border:none;border-radius:50px;background:linear-gradient(135deg,#28A745,#1E7E34);color:#fff;font-family:'Poppins',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .25s}
.btndeliver:hover:not(:disabled){transform:scale(1.02)}
.btndeliver:disabled{background:#2A2A3E;cursor:not-allowed}
.btndel{padding:10px 14px;border:1.5px solid #C0392B33;border-radius:50px;background:transparent;color:#C0392B;cursor:pointer;transition:all .2s}
.btndel:hover{background:rgba(192,57,43,.12)}
.btnwa{padding:8px 12px;border:1.5px solid rgba(37,211,102,.3);border-radius:50px;background:transparent;color:#25D366;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.btnwa:hover{background:rgba(37,211,102,.12)}
.donebadge{flex:1;text-align:center;padding:9px;color:#28A745;font-size:.82rem;font-weight:600;background:rgba(40,167,69,.07);border-radius:50px}
#livetime{font-size:.72rem;color:#444}
@media(max-width:500px){#stats{grid-template-columns:1fr 1fr}.ohead{flex-direction:column;align-items:flex-start}.odt{margin-left:0}}
</style>
</head>
<body>
<div id="loginWrap">
  <div class="lbox">
    <h2>🍕 BudgetMein</h2>
    <p>Admin Panel — Enter PIN</p>
    <div class="pins">
      <input type="password" maxlength="1" id="p1" inputmode="numeric" oninput="mf(this,'p2')"/>
      <input type="password" maxlength="1" id="p2" inputmode="numeric" oninput="mf(this,'p3')"/>
      <input type="password" maxlength="1" id="p3" inputmode="numeric" oninput="mf(this,'p4')"/>
      <input type="password" maxlength="1" id="p4" inputmode="numeric" oninput="chkPin()"/>
    </div>
    <div id="pinErr"></div>
    <button class="lbtn" onclick="chkPin()">Enter Admin Panel 🚀</button>
    <button class="cpbtn" onclick="toggleCP()">🔐 Change PIN</button>
    <div id="cpbox">
      <label>Current PIN</label>
      <input type="password" id="curP" maxlength="4" inputmode="numeric" placeholder="Current PIN"/>
      <label>New PIN (4 digits)</label>
      <input type="password" id="newP" maxlength="4" inputmode="numeric" placeholder="New PIN"/>
      <label>Confirm New PIN</label>
      <input type="password" id="cnfP" maxlength="4" inputmode="numeric" placeholder="Confirm PIN"/>
      <button class="spbtn" onclick="savePIN()">✅ Save New PIN</button>
    </div>
  </div>
</div>
<div id="panel">
  <div class="topbar">
    <h1>🍕 BudgetMein Admin</h1>
    <span id="livetime"></span>
    <button class="rbtn" onclick="loadOrders()">🔄 Refresh</button>
    <button class="rbtn red" onclick="clearDone()">🗑️ Clear Done</button>
    <button class="rbtn red" onclick="clearAll()">⚠️ Clear All</button>
    <button class="rbtn grey" onclick="exitAdmin()">Exit</button>
  </div>
  <div id="stats"></div>
  <div id="loading">Loading orders...</div>
  <div id="ordersDiv"></div>
</div>
<script>
function getPin(){return localStorage.getItem('bm_admin_pin')||'1234';}
function mf(el,nid){if(el.value.length===1){var n=document.getElementById(nid);if(n)n.focus();}}
function chkPin(){
  var pin=['p1','p2','p3','p4'].map(function(id){return document.getElementById(id).value;}).join('');
  if(pin.length<4)return;
  if(pin===getPin()){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('panel').style.display='block';
    loadOrders();
    setInterval(loadOrders,15000); // Auto-refresh every 15 sec
    setInterval(function(){document.getElementById('livetime').textContent=new Date().toLocaleTimeString('en-IN');},1000);
  } else {
    document.getElementById('pinErr').textContent='❌ Wrong PIN!';
    ['p1','p2','p3','p4'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('p1').focus();
    setTimeout(function(){document.getElementById('pinErr').textContent='';},2000);
  }
}
function toggleCP(){var b=document.getElementById('cpbox');b.style.display=b.style.display==='block'?'none':'block';}
function savePIN(){
  var c=document.getElementById('curP').value;
  var n=document.getElementById('newP').value;
  var f=document.getElementById('cnfP').value;
  if(c!==getPin()){alert('❌ Current PIN is wrong!');return;}
  if(!/^\d{4}$/.test(n)){alert('New PIN must be exactly 4 digits!');return;}
  if(n!==f){alert('PINs do not match!');return;}
  localStorage.setItem('bm_admin_pin',n);
  alert('✅ PIN changed to: '+n+'\n\nPlease remember it!');
  document.getElementById('cpbox').style.display='none';
  ['curP','newP','cnfP'].forEach(function(id){document.getElementById(id).value='';});
}
function exitAdmin(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('panel').style.display='none';
  ['p1','p2','p3','p4'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('p1').focus();
}
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('loginWrap').style.display!=='none')chkPin();
});
</script>
</body>
</html>
